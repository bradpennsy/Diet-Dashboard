<!DOCTYPE html>
<html lang="en">
<head>

<title>Diet Progress Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── PALETTE SYSTEM: per-nutrient chart colors (--c-*) + structural colors ─── */
:root,[data-palette="cream"]{--bg:#FFFDF5;--card:#FFF;--text:#2D2B26;--sub:#6F6E69;--border:#E5E3D9;--accent:#D97757;--cream:#F5F3EA;--green:#5A9E6B;--red:#C44D45;--gray:#8C8B85;--c-cal:#D97757;--c-sodium:#B59430;--c-protein:#2E8E82;--c-carbs:#5A7EB5;--c-fat:#C48A5A;--c-fiber:#4A8F5A;--c-sugar:#8868AF;--c-burn:#7E6DAF;--c-indigo:#5B6AAF}
[data-palette="ocean"]{--bg:#F0F6FA;--card:#FFF;--text:#1A3044;--sub:#5E7A8F;--border:#CFE0EC;--accent:#1A7AAF;--cream:#E4EFF7;--green:#2A8B5E;--red:#C44040;--gray:#7A919F;--c-cal:#1A7AAF;--c-sodium:#B07A2A;--c-protein:#0A8A7A;--c-carbs:#3060A0;--c-fat:#C07848;--c-fiber:#2A7A4A;--c-sugar:#6050A8;--c-burn:#5A60B0;--c-indigo:#3A5090}
[data-palette="sage"]{--bg:#F5F5EE;--card:#FAFAF5;--text:#2F3527;--sub:#717866;--border:#D5D9CA;--accent:#8B6E4E;--cream:#ECEEE4;--green:#5A8B4A;--red:#A84A40;--gray:#8A8D82;--c-cal:#A07040;--c-sodium:#8A7A30;--c-protein:#3A7A5A;--c-carbs:#5A7A8A;--c-fat:#A08050;--c-fiber:#4A7A3A;--c-sugar:#7A6A8A;--c-burn:#6A6A90;--c-indigo:#5A6A7A}
[data-palette="rose"]{--bg:#FDF5F5;--card:#FFF;--text:#3A2028;--sub:#8A6B73;--border:#E8D0D5;--accent:#C26070;--cream:#F5E8EB;--green:#4A9060;--red:#C04848;--gray:#9A858A;--c-cal:#C26070;--c-sodium:#B08030;--c-protein:#3A8878;--c-carbs:#6878A8;--c-fat:#C08060;--c-fiber:#508A48;--c-sugar:#9060A0;--c-burn:#7868A0;--c-indigo:#6060A0}
[data-palette="paper"]{--bg:#FDFDFC;--card:#FFF;--text:#1A1A1A;--sub:#777;--border:#E0E0E0;--accent:#3366CC;--cream:#F5F5F5;--green:#2E8B57;--red:#CC3333;--gray:#999;--c-cal:#3366CC;--c-sodium:#CC8800;--c-protein:#008888;--c-carbs:#2244AA;--c-fat:#CC6622;--c-fiber:#228844;--c-sugar:#7744BB;--c-burn:#5566AA;--c-indigo:#4444AA}
[data-palette="slate"]{--bg:#1E2228;--card:#282D35;--text:#D4D7DD;--sub:#8B9099;--border:#3C424C;--accent:#E88A60;--cream:#2E343C;--green:#5EBB78;--red:#E06058;--gray:#6B7280;--c-cal:#E88A60;--c-sodium:#D4A840;--c-protein:#44BBAA;--c-carbs:#6A9AD8;--c-fat:#E0A060;--c-fiber:#55CC70;--c-sugar:#AA88DD;--c-burn:#8A80D0;--c-indigo:#7080C0}
[data-palette="midnight"]{--bg:#1A1A2E;--card:#222240;--text:#E0DEF0;--sub:#8A88A0;--border:#3A3858;--accent:#FF9070;--cream:#2A2848;--green:#60CC80;--red:#FF6A60;--gray:#6A687A;--c-cal:#FF9070;--c-sodium:#DDAA40;--c-protein:#40CCBB;--c-carbs:#70A0E0;--c-fat:#FFAA70;--c-fiber:#55DD75;--c-sugar:#BB90EE;--c-burn:#9988DD;--c-indigo:#8090DD}
[data-palette="nord"]{--bg:#2E3440;--card:#3B4252;--text:#ECEFF4;--sub:#8893A6;--border:#4C566A;--accent:#D08770;--cream:#434C5E;--green:#A3BE8C;--red:#BF616A;--gray:#6B7894;--c-cal:#D08770;--c-sodium:#EBCB8B;--c-protein:#8FBCBB;--c-carbs:#81A1C1;--c-fat:#D08770;--c-fiber:#A3BE8C;--c-sugar:#B48EAD;--c-burn:#81A1C1;--c-indigo:#5E81AC}
[data-palette="espresso"]{--bg:#2B2220;--card:#352B28;--text:#E8DDD5;--sub:#9A8A80;--border:#4D3F3A;--accent:#E8A060;--cream:#3E3230;--green:#7EBB6E;--red:#D06050;--gray:#7A6E68;--c-cal:#E8A060;--c-sodium:#D4AA50;--c-protein:#55AA8A;--c-carbs:#7A9ABB;--c-fat:#E0A070;--c-fiber:#70BB60;--c-sugar:#AA80CC;--c-burn:#8878AA;--c-indigo:#7070AA}
[data-palette="monokai"]{--bg:#272822;--card:#2E2F2A;--text:#F8F8F2;--sub:#90908A;--border:#49483E;--accent:#F92672;--cream:#3E3D32;--green:#A6E22E;--red:#F92672;--gray:#75715E;--c-cal:#F92672;--c-sodium:#E6DB74;--c-protein:#66D9EF;--c-carbs:#AE81FF;--c-fat:#FD971F;--c-fiber:#A6E22E;--c-sugar:#AE81FF;--c-burn:#66D9EF;--c-indigo:#AE81FF}
[data-palette="dracula"]{--bg:#282A36;--card:#2E3044;--text:#F8F8F2;--sub:#8A8DA0;--border:#44475A;--accent:#FF79C6;--cream:#383A4E;--green:#50FA7B;--red:#FF5555;--gray:#6272A4;--c-cal:#FF79C6;--c-sodium:#F1FA8C;--c-protein:#8BE9FD;--c-carbs:#BD93F9;--c-fat:#FFB86C;--c-fiber:#50FA7B;--c-sugar:#BD93F9;--c-burn:#8BE9FD;--c-indigo:#BD93F9}
[data-palette="solarized"]{--bg:#002B36;--card:#073642;--text:#93A1A1;--sub:#657B83;--border:#0A4959;--accent:#CB4B16;--cream:#0A4050;--green:#859900;--red:#DC322F;--gray:#586E75;--c-cal:#CB4B16;--c-sodium:#B58900;--c-protein:#2AA198;--c-carbs:#268BD2;--c-fat:#D49A6A;--c-fiber:#859900;--c-sugar:#6C71C4;--c-burn:#268BD2;--c-indigo:#6C71C4}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Sohne','Helvetica Neue',sans-serif;padding:20px 16px;min-height:100vh;transition:background .3s,color .3s}
.m{font-family:'IBM Plex Mono',monospace}
.w{max-width:1200px;margin:0 auto}
.cs{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.c{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:12px 14px;flex:1;min-width:120px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .3s}
.c .l{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.c .v{margin-top:4px;font-size:18px;font-weight:700}
.c .s{margin-top:2px;font-size:10px;color:var(--sub)}
.sec{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 14px 10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .3s}
.sec h3{margin:0 0 10px;font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:900px){.row3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.row2,.row3{grid-template-columns:1fr}}
.ts{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.t{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;font-weight:600;font-size:12px;font-family:inherit;transition:all .15s}
.t:hover{border-color:var(--accent);color:var(--accent)}
.t.a{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);color:var(--accent)}
.gb{position:relative;height:28px;border-radius:14px;background:var(--cream);border:1px solid var(--border);overflow:hidden;margin-bottom:6px}
.gc{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--gray);opacity:.5;z-index:2}
.gf{position:absolute;top:3px;bottom:3px;transition:width .6s ease}
.gd{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;border:2px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:3}
.lg{display:flex;gap:14px;padding:6px 4px 0;flex-wrap:wrap;font-size:9px;color:var(--sub)}.lg>div{display:flex;align-items:center;gap:5px}
.ins{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px 18px;margin-top:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .3s}
.ins h4{font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ins p{font-size:12px;line-height:1.5;margin-bottom:6px}.ins p:last-child{margin-bottom:0}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
thead tr{border-bottom:2px solid var(--border);background:var(--cream)}
th{padding:10px 8px;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--sub)}
td{padding:10px 8px}
.pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.prog-label{width:66px;font-size:11px;font-weight:600;flex-shrink:0}
.prog-track{flex:1;height:20px;background:var(--cream);border-radius:10px;border:1px solid var(--border);position:relative;overflow:visible}
.prog-fill{height:100%;border-radius:10px;transition:width .5s ease}
.prog-val{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:var(--text)}
.prog-marker{position:absolute;top:-4px;bottom:-4px;width:2px;z-index:2}
.prog-marker-label{position:absolute;top:-15px;font-size:8px;font-weight:600;white-space:nowrap;transform:translateX(-50%)}
.prog-meta{width:105px;font-size:10px;color:var(--sub);text-align:right;flex-shrink:0}
.meal-card{background:var(--cream);border-radius:10px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);transition:background .3s}
.meal-card h4{font-size:12px;font-weight:600;margin-bottom:3px}
.meal-card .desc{font-size:10px;color:var(--sub);margin-bottom:4px}
.meal-card .time{font-size:9px;color:var(--gray);margin-bottom:3px}
.meal-macros{display:flex;gap:6px;flex-wrap:wrap;font-size:10px}
.meal-macros span{padding:2px 6px;border-radius:5px;font-weight:600}
.vw{display:none}.vw.a{display:block}
footer{margin-top:14px;font-size:10px;color:var(--sub);text-align:center}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.rf{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);cursor:pointer;font-size:10px;font-weight:600;transition:all .15s}.rf:hover{border-color:var(--accent);color:var(--accent)}
.pal-wrap{display:flex;gap:5px;align-items:center}
.pal-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.pal-dot:hover,.pal-dot.a{border-color:var(--text);transform:scale(1.15)}
.ld{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column}
.sp{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:16px}
@keyframes sp{to{transform:rotate(360deg)}}
.err-box{background:var(--card);border:1px solid var(--red);border-radius:12px;padding:24px;max-width:420px;text-align:center}
</style>
</head>
<body>
<div class="w">
<div class="ld" id="loader"><div class="sp"></div><p class="m" style="color:var(--sub);font-size:13px">Fetching from Supabase…</p></div>
<div id="app" style="display:none"></div>
</div>
<script>
const API='https://thuymlbzpchbbptulpbq.supabase.co/functions/v1/dashboard-data';
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fm=s=>{const d=new Date(s+'T12:00:00');return(d.getMonth()+1)+'/'+d.getDate();};
const dn=s=>DN[new Date(s+'T12:00:00').getDay()];
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function cv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
// Theme-aware colors — includes per-nutrient chart colors
function getC(){return{accent:cv('--accent'),green:cv('--green'),red:cv('--red'),gray:cv('--gray'),border:cv('--border'),sub:cv('--sub'),card:cv('--card'),text:cv('--text'),
  cCal:cv('--c-cal'),cSodium:cv('--c-sodium'),cProtein:cv('--c-protein'),cCarbs:cv('--c-carbs'),cFat:cv('--c-fat'),cFiber:cv('--c-fiber'),cSugar:cv('--c-sugar'),cBurn:cv('--c-burn'),cIndigo:cv('--c-indigo')};}
const HIGHER_GOOD=new Set(['protein','fiber']);

const PALETTES=[
  {id:'cream',label:'Cream',dot:'#FFFDF5',ring:'#D97757'},
  {id:'ocean',label:'Ocean',dot:'#F0F6FA',ring:'#1A7AAF'},
  {id:'sage',label:'Sage',dot:'#F5F5EE',ring:'#5A8B4A'},
  {id:'rose',label:'Rose',dot:'#FDF5F5',ring:'#C26070'},
  {id:'paper',label:'Paper',dot:'#FDFDFC',ring:'#3366CC'},
  {id:'slate',label:'Slate',dot:'#1E2228',ring:'#E88A60'},
  {id:'midnight',label:'Midnight',dot:'#1A1A2E',ring:'#FF9070'},
  {id:'nord',label:'Nord',dot:'#2E3440',ring:'#D08770'},
  {id:'espresso',label:'Espresso',dot:'#2B2220',ring:'#E8A060'},
  {id:'monokai',label:'Monokai',dot:'#272822',ring:'#A6E22E'},
  {id:'dracula',label:'Dracula',dot:'#282A36',ring:'#FF79C6'},
  {id:'solarized',label:'Solarized',dot:'#002B36',ring:'#2AA198'},
];
function initPalette(){document.documentElement.setAttribute('data-palette',localStorage.getItem('dashboard-palette')||'cream');}
function setPalette(id){document.documentElement.setAttribute('data-palette',id);localStorage.setItem('dashboard-palette',id);if(window._raw)render(window._raw);}
initPalette();

function localHour(utcStr){const d=new Date(utcStr);const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'numeric',hour12:false}).formatToParts(d);return+(p.find(x=>x.type==='hour')?.value||0)+(+(p.find(x=>x.type==='minute')?.value||0))/60;}
function fmtTime(utcStr){return new Date(utcStr).toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});}
function cumulativeAtHour(meals,hour,key){let t=0;for(const m of meals){if(localHour(m.created_at)<=hour)t+=(+m[key]||0);}return t;}

function hexToRGB(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];return[parseInt(hex.slice(0,2),16),parseInt(hex.slice(2,4),16),parseInt(hex.slice(4,6),16)];}
function gradientColor(score){
  const s=Math.max(-1,Math.min(1,score));
  const gRGB=hexToRGB(cv('--green'));const rRGB=hexToRGB(cv('--red'));
  const yRGB=[Math.min(255,Math.round((gRGB[0]+rRGB[0])/2*1.1)),Math.round((gRGB[1]+rRGB[1])/2*0.95),Math.round((gRGB[0]+rRGB[2])/2*0.4)];
  let r,g,b;
  if(s<=0){const t=s+1;r=Math.round(gRGB[0]+t*(yRGB[0]-gRGB[0]));g=Math.round(gRGB[1]+t*(yRGB[1]-gRGB[1]));b=Math.round(gRGB[2]+t*(yRGB[2]-gRGB[2]));}
  else{const t=s;r=Math.round(yRGB[0]+t*(rRGB[0]-yRGB[0]));g=Math.round(yRGB[1]+t*(rRGB[1]-yRGB[1]));b=Math.round(yRGB[2]+t*(rRGB[2]-yRGB[2]));}
  return'rgb('+Math.min(255,r)+','+Math.min(255,g)+','+Math.min(255,b)+')';
}

// Pace score with DEAD ZONE: stay green until 10% past pace, then ramp to red
function paceScore(val,pace,hg){
  if(!pace)return-1;
  const ratio=(val-pace)/pace;
  const dead=0.10;
  let raw;
  if(hg){raw=ratio>=-dead?-1:Math.min(1,(-ratio-dead)/(0.5-dead));}
  else{raw=ratio<=dead?-1:Math.min(1,(ratio-dead)/(0.5-dead));}
  return raw;
}

// Bar color for charts: green when on-target, orange→red gradient when over
// Returns theme-aware color for chart bars
// Chart bar color: under/at target = good color. Over target = gradient from midpoint → bad.
// Reads theme's --green (good) and --red (bad). Behavior is identical across all themes.
function barColor(val,target,hg){
  const good=hexToRGB(cv('--green'));
  const bad=hexToRGB(cv('--red'));
  const mid=[
    Math.min(255,Math.round(good[0]*0.4+bad[0]*0.6)),
    Math.round(good[1]*0.55+bad[1]*0.45),
    Math.round(good[2]*0.3+bad[2]*0.2)
  ];
  function lerp(a,b,t){return Math.round(a+(b-a)*t);}
  function rgb3(c){return'rgb('+c[0]+','+c[1]+','+c[2]+')';}
  function blend(t){// t: 0=mid, 1=bad
    t=Math.max(0,Math.min(1,t));
    return'rgb('+lerp(mid[0],bad[0],t)+','+lerp(mid[1],bad[1],t)+','+lerp(mid[2],bad[2],t)+')';
  }
  if(hg){
    if(val>=target)return rgb3(good); // on or above target = good
    const pct=(target-val)/target; // how far below: 0=at target, 1=zero intake
    return blend(pct*1.5); // ramps to full bad at ~67% below target
  }else{
    if(val<=target)return rgb3(good); // on or below target = good
    const pct=(val-target)/target; // how far above: 0=at target, 1=double
    return blend(pct*2); // ramps to full bad at 50% over target
  }
}

async function init(){
  try{const res=await fetch(API);if(!res.ok)throw new Error('HTTP '+res.status);const raw=await res.json();if(raw.error)throw new Error(raw.error);window._raw=Array.isArray(raw)?{daily:raw,recent_meals:[],today_date:todayStr()}:raw;render(window._raw);}
  catch(e){document.getElementById('loader').innerHTML='<div class="err-box"><p style="color:var(--red);font-weight:700;font-size:16px;margin-bottom:8px">Failed to load</p><p style="color:var(--sub);font-size:12px;margin-bottom:12px">'+e.message+'</p><button class="rf" onclick="location.reload()">Retry</button></div>';}
}

function render(raw){
  if(window._charts){window._charts.forEach(c=>c.destroy());}window._charts=[];
  document.getElementById('loader').style.display='none';
  const app=document.getElementById('app');app.style.display='block';
  const C=getC();const pal=localStorage.getItem('dashboard-palette')||'cream';
  const today=raw.today_date||todayStr();const recentMeals=raw.recent_meals||raw.today_meals||[];const RAW=raw.daily||raw;

  const allDays=RAW.map(r=>({date:fm(r.log_date),raw:r.log_date,day:dn(r.log_date),cal:+r.calories_kcal||0,protein:+r.protein_g||0,carbs:+r.carbs_g||0,fat:+r.fat_g||0,fiber:+r.fiber_g||0,sodium:+r.sodium_mg||0,sugar:+r.sugar_g||0,ac:Math.round(+r.active_cal||0),inProgress:r.log_date===today}));
  const days=allDays.filter(d=>!d.inProgress),hasIP=allDays.some(d=>d.inProgress),todayData=allDays.find(d=>d.inProgress);
  const mealsByDate={};recentMeals.forEach(m=>{if(!mealsByDate[m.log_date])mealsByDate[m.log_date]=[];mealsByDate[m.log_date].push(m);});
  const todayMeals=mealsByDate[today]||[];
  const currentHour=localHour(new Date().toISOString());
  const past7Dates=days.slice(-7).map(d=>d.raw);
  const macroKeys=['cal','protein','carbs','fat','fiber','sodium','sugar'];
  const keyMap={cal:'calories_kcal',protein:'protein_g',carbs:'carbs_g',fat:'fat_g',fiber:'fiber_g',sodium:'sodium_mg',sugar:'sugar_g'};
  const paceAtHour={};macroKeys.forEach(k=>paceAtHour[k]=[]);let daysWithTimestamps=0;

  // Macro bars
  macros.forEach(mc=>{const hg=HIGHER_GOOD.has(mc.k);const mLabels=allDays.map(d=>d.date);
    ch.push(new Chart(document.getElementById('ov_'+mc.k),{type:'bar',data:{labels:mLabels,datasets:[
      {label:mc.l,data:allDays.map(d=>d[mc.k]),backgroundColor:allDays.map(d=>d.inProgress?C.gray+'70':barColor(d[mc.k],mc.t,hg)),borderRadius:2,barPercentage:.7,order:1},
      refDS(mLabels,mc.t,mc.t+mc.u)
    ]},plugins:[refLabelPlugin],options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:C.sub,maxTicksLimit:8}},y:{min:0,suggestedMax:Math.round(mc.t*1.3),grid:gO,ticks:{color:C.sub}}}}}));});

  // Trends
  const tlb=days.map(d=>d.date);
  function tc(id,k,co,ry,hg){
    const u=k==='cal'?' kcal':k==='sodium'?'mg':'g';
    const ds=[{label:'Daily',data:days.map(d=>d[k]),borderColor:co,backgroundColor:co+'25',fill:true,tension:.3,pointRadius:2,borderWidth:2,order:1}];
    if(ry)ds.push(refDS(tlb,ry,ry.toLocaleString()+u));
    ch.push(new Chart(document.getElementById(id),{type:'line',data:{labels:tlb,datasets:ds},plugins:[refLabelPlugin],options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:C.sub,maxTicksLimit:10}},y:{suggestedMax:ry?Math.round(ry*1.3):undefined,grid:gO,ticks:{color:C.sub}}}}}));}
  tc('calT','cal',C.cCal,2000,false);tc('sodT','sodium',C.cSodium,2300,false);
  macros.forEach(mc=>{tc('tr_'+mc.k,mc.k,mc.c,mc.t,HIGHER_GOOD.has(mc.k));});

  window._charts=ch;
}

function sv(el){window._activeTab=el.dataset.v;document.querySelectorAll('.t').forEach(b=>b.classList.remove('a'));el.classList.add('a');document.querySelectorAll('.vw').forEach(v=>v.classList.remove('a'));document.getElementById('vw-'+el.dataset.v).classList.add('a');}
init();
</script>
</body>
